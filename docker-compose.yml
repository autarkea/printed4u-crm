services:
  bot:
    build: ./bot
    container_name: printed4u-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/data/projects:/mnt/data/projects
      - /mnt/data/clients:/mnt/data/clients
      - /mnt/data/noco-static:/mnt/data/noco-static
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"

  webhook:
    build: ./webhook
    container_name: printed4u-webhook
    restart: unless-stopped
    env_file: .env
    volumes:
      - /mnt/data/projects:/mnt/data/projects
      - /mnt/data/clients:/mnt/data/clients
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
