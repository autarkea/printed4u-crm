services:
  nocodb:
    image: nocodb/nocodb:latest
    container_name: nocodb
    restart: unless-stopped
    environment:
      - NC_AUTH_JWT_SECRET=${JWT_SECRET:-default_jwt_secret_change_this}
    volumes:
      - /mnt/data/nocodb-data:/usr/app/data
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: printed4u-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NOCO_URL=http://nocodb:8080/api/v1/db/data
    volumes:
      - /mnt/data/projects:/mnt/data/projects
      - /mnt/data/clients:/mnt/data/clients
      - /mnt/data/noco-static:/mnt/data/noco-static
    ports:
      - "3000:3000"
    depends_on:
      nocodb:
        condition: service_healthy

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    container_name: printed4u-webhook
    restart: unless-stopped
    env_file: .env
    environment:
      - NOCO_URL=http://nocodb:8080/api/v1/db/data
    volumes:
      - /mnt/data/projects:/mnt/data/projects
      - /mnt/data/clients:/mnt/data/clients
    ports:
      - "3001:3001"
    depends_on:
      nocodb:
        condition: service_healthy
